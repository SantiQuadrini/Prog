<div id="carouselExampleAutoplaying" 
     class="carousel slide"
     data-bs-ride="carousel"
     data-bs-interval="3000"
     style="width:100%; background: linear-gradient(135deg, #b22222, #ff8c00, #ffd700); padding:20px; border-radius:15px;">

  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="assets/descarga.jpg" class="d-block w-100" alt="Pizza 1">
    </div>

    <div class="carousel-item">
      <img src="assets/descarga (1).jpg" class="d-block w-100" alt="Pizza 2">
    </div>

    <div class="carousel-item">
      <img src="assets/descarga (2).jpg" class="d-block w-100" alt="Pizza 3">
    </div>
  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>
