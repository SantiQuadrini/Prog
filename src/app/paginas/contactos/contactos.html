<head>
    <title>Contacto - Pizzería Delizia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff3e0;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #d84315;
            color: rgb(255, 255, 255);
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: 30px auto;
            background: linear-gradient(90deg, #1a0000, #4b0000, #8b0000);
            color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #d84315;
        }

        label {
            display: block;
            margin-top: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            margin-top: 20px;
            width: 100%;
            background-color: #d84315;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #bf360c;
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #d84315;
            color: white;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<header>
    <h1>Pizzería Don Luigi Il Conto Porfavore</h1>
    <p>¡Contáctanos para pedidos o consultas!</p>
</header>

<div class="container">
    <h2>Formulario de Contacto</h2>
    <form>
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" required>

        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" name="telefono">

        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" name="mensaje" required></textarea>

        <button type="submit">Enviar Mensaje</button>
    </form>
</div>

<footer>
    <p>📍 Cipolletti, Río Negro | 📞 299-123-4567</p>
</footer>
